<div class="payment-method" data-bind="css: {'_active': (getCode() == isChecked())}">
    <div class="payment-method-title field choice payxcommerce-payment-title">
        <input type="radio" name="payment[method]" class="radio" data-bind="attr: {'id': getCode()}, value: getCode(), checked: isChecked, click: selectPaymentMethod, visible: isRadioButtonVisible()"/>
        <label data-bind="attr: {'for': getCode()}" class="label" style="align-items:center;display:inline-flex;">
            <img data-bind="attr: {src: getIconUrl(), alt: getTitle()}" style="height:28px;width:28px;border-radius:6px;margin-right:8px;vertical-align:middle;"/>
            <span data-bind="text: getTitle()"></span>
        </label>
    </div>
    <div class="payment-method-content payxcommerce-payment-content">
        <p data-bind="text: getDescription()" style="margin-top:0;"></p>
        <div class="checkout-agreements-block"><!-- ko foreach: $parent.getRegion('before-place-order') --><!-- ko template: getTemplate() --><!-- /ko --><!--/ko--></div>
        <div class="actions-toolbar">
            <div class="primary">
                <button class="action primary checkout" type="submit" data-bind="click: placeOrder, enable: (getCode() == isChecked()), css: {disabled: !isPlaceOrderActionAllowed()}">
                    <span data-bind="text: getButtonText()"></span>
                </button>
            </div>
        </div>
    </div>
</div>
