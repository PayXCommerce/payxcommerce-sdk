[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "payxcommerce"
version = "0.1.0"
description = "Python SDK for PayXCommerce API v1 hosted checkout, refunds, balances, transactions, OAuth, and webhooks."
readme = "README.md"
requires-python = ">=3.9"
license = {text = "MIT"}
authors = [{name = "PayXCommerce", email = "support@payxcommerce.com"}]
keywords = ["payxcommerce", "payments", "hosted-checkout", "fintech"]
classifiers = [
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.9",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "License :: OSI Approved :: MIT License",
]

[tool.setuptools.packages.find]
include = ["payxcommerce*"]
